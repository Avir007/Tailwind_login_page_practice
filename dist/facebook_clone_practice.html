<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
  <title>Facebook - Login or Signup</title>
</head>

<body class="bg-gray-100">
  <div class="container flex mt-36 mx-auto items-center justify-center">
    <div class="left w-1/3">
      <img class="w-60 -ml-6 -mb-10" src="/fb_logo.svg" alt="">
      <p class="text-2xl">Facebook helps you connects and share with people in your life</p>

    </div>
    <div class="right flex flex-col bg-white w-1/3 p-8 ml-20 rounded-2xl relative">
      <input class="px-4 my-2 h-12 border border-gray-500 rounded-lg outline-blue-500" type="text"
        placeholder="Email Address or Phone ">
      <input class="px-4 my-3 h-12 border border-gray-500 rounded-lg outline-blue-500" type="text"
        placeholder="Password">
      <button class="bg-blue-600 text-white font-bold rounded-lg my-2 py-2 cursor-pointer hover:bg-blue-500">Log
        in</button>
      <span class="my-2 text-center text-blue-500 cursor-pointer hover:underline">Forgotten Password ?</span>
      <hr class="my-2 text-gray-400">
      <button
        class="bg-green-500 text-white font-bold rounded-lg my-2 py-2 px-2 mx-auto cursor-pointer hover:bg-green-400">Create
        New Account</button>
      <span class="absolute -bottom-12 text-sm"><span class="font-bold hover:underline cursor-pointer">Create a Page</span> for a celebrity, brand or
        business.</span>

    </div>
  </div>

</body>

</html>
